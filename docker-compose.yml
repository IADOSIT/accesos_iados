version: '3.8'

services:
  backend:
    build: ./backend
    container_name: iados-api
    platform: linux/arm64
    ports:
      - "3004:3001"
    # OPCIÓN RECOMENDADA: Define las variables directamente en la UI de Portainer
    # o usa una sola ruta plana si logras subir el archivo:
    env_file:
      - stack.env 
    restart: always
    networks:
      - web_network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3001/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: iados-web
    platform: linux/arm64
    ports:
      - "3005:3002"
    env_file:
      - stack.env
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    networks:
      - web_network

networks:
  web_network:
    external: true