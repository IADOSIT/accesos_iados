version: '3.8'

services:
  backend:
    build: ./backend
    container_name: iados-api
    ports:
      - "3004:3001"
    environment:
      - DATABASE_URL=postgresql://usuario:password@host:5432/porton_digital?sslmode=require
      - JWT_SECRET=cambiar-en-produccion-clave-segura-min-32-chars
      - JWT_EXPIRES_IN=24h
      - JWT_REFRESH_EXPIRES_IN=7d
      - PORT=3001
      - NODE_ENV=development
      - FRONTEND_URL=http://localhost:3005
      - MQTT_BROKER_URL=
      - MQTT_USERNAME=
      - MQTT_PASSWORD=
      - ACCESS_COOLDOWN_SECONDS=30
    restart: always
    networks:
      - web_network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3001/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: iados-web
    ports:
      - "3005:3002"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3004/api
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    networks:
      - web_network

networks:
  web_network:
    external: true
