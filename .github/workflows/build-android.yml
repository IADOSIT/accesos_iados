name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Leer versión del proyecto
        id: version
        run: echo "version=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)" >> $GITHUB_OUTPUT

      - name: Decodificar keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$KEYSTORE_BASE64" | base64 --ignore-garbage --decode > android/app/release-key.jks
          ls -la android/app/release-key.jks

      - name: Crear key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=app/release-key.jks
          EOF

      - name: Instalar dependencias
        run: flutter pub get

      - name: Build APK release
        run: |
          flutter build apk --release \
            --dart-define=API_URL=https://accesodigitalapi.iados.mx/api \
            --dart-define=PORTAL_URL=https://accesodigital.iados.mx

      - name: Renombrar APK con versión
        run: |
          VERSION=${{ steps.version.outputs.version }}
          cp build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/AccesoDigital-${VERSION}.apk

      - name: Subir APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: AccesoDigital-${{ steps.version.outputs.version }}
          path: mobile/build/app/outputs/flutter-apk/AccesoDigital-*.apk
          retention-days: 30
