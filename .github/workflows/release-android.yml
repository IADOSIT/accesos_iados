name: Publicar versión Android

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Notas de la versión (se muestran en la app)'
        required: false
        default: 'Correcciones y mejoras de rendimiento'
      mandatory:
        description: '¿Actualización obligatoria? (bloquea la app hasta que el usuario actualice)'
        type: boolean
        default: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Leer versión y build
        id: version
        run: |
          RAW=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "version=$(echo $RAW | cut -d'+' -f1)" >> $GITHUB_OUTPUT
          echo "build=$(echo $RAW | cut -d'+' -f2)"   >> $GITHUB_OUTPUT

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Decodificar keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$KEYSTORE_BASE64" | base64 --ignore-garbage --decode > android/app/release-key.jks

      - name: Crear key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=release-key.jks
          EOF

      - name: Instalar dependencias
        run: flutter pub get

      - name: Build APK release
        run: |
          flutter build apk --release \
            --dart-define=API_URL=https://accesodigitalapi.iados.mx/api \
            --dart-define=PORTAL_URL=https://accesodigital.iados.mx

      - name: Build AAB (Play Store)
        run: |
          flutter build appbundle --release \
            --dart-define=API_URL=https://accesodigitalapi.iados.mx/api \
            --dart-define=PORTAL_URL=https://accesodigital.iados.mx

      - name: Crear carpeta de releases en VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: mkdir -p /opt/iados/uploads/app-releases

      - name: Copiar APK al VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: mobile/build/app/outputs/flutter-apk/app-release.apk
          target: /opt/iados/uploads/app-releases/
          strip_components: 5
          overwrite: true

      - name: Renombrar APK en VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mv -f /opt/iados/uploads/app-releases/app-release.apk \
                   /opt/iados/uploads/app-releases/acceso-digital.apk

      - name: Actualizar versión en backend y reiniciar
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_VER: ${{ steps.version.outputs.version }}
          APP_BUILD: ${{ steps.version.outputs.build }}
          APP_NOTES: ${{ github.event.inputs.release_notes }}
          APP_MANDATORY: ${{ github.event.inputs.mandatory }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: APP_VER,APP_BUILD,APP_NOTES,APP_MANDATORY
          script: |
            cd /opt/iados
            DOWNLOAD_URL="https://accesodigitalapi.iados.mx/api/uploads/app-releases/acceso-digital.apk"

            sed -i "s|APP_VERSION=.*|APP_VERSION=${APP_VER}|"                docker-compose.yml
            sed -i "s|APP_BUILD_NUMBER=.*|APP_BUILD_NUMBER=${APP_BUILD}|"    docker-compose.yml
            sed -i "s|APP_DOWNLOAD_URL=.*|APP_DOWNLOAD_URL=${DOWNLOAD_URL}|" docker-compose.yml
            sed -i "s|APP_RELEASE_NOTES=.*|APP_RELEASE_NOTES=${APP_NOTES}|"  docker-compose.yml
            sed -i "s|APP_UPDATE_MANDATORY=.*|APP_UPDATE_MANDATORY=${APP_MANDATORY}|" docker-compose.yml

            docker compose up -d --force-recreate --no-deps backend
            echo "Versión ${APP_VER}+${APP_BUILD} publicada correctamente"

      - name: Subir APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: AccesoDigital-${{ steps.version.outputs.version }}
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90

      - name: Subir AAB como artifact (Play Store)
        uses: actions/upload-artifact@v4
        with:
          name: AccesoDigital-${{ steps.version.outputs.version }}-PlayStore
          path: mobile/build/app/outputs/bundle/release/app-release.aab
          retention-days: 90
