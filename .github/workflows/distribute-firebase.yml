name: Distribuir APK via Firebase App Distribution

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Notas de la versión para los testers'
        required: false
        default: 'Nueva versión disponible'
      groups:
        description: 'Grupos de testers en Firebase (separados por coma, ej: beta-testers,admin)'
        required: false
        default: 'beta-testers'

jobs:
  distribute:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Leer versión
        id: version
        run: |
          RAW=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "version=$(echo $RAW | cut -d'+' -f1)" >> $GITHUB_OUTPUT
          echo "build=$(echo $RAW | cut -d'+' -f2)"   >> $GITHUB_OUTPUT

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Decodificar keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$KEYSTORE_BASE64" | base64 --ignore-garbage --decode > android/app/release-key.jks

      - name: Crear key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=release-key.jks
          EOF

      - name: Instalar dependencias
        run: flutter pub get

      - name: Build APK release
        run: |
          flutter build apk --release \
            --dart-define=API_URL=https://accesodigitalapi.iados.mx/api \
            --dart-define=PORTAL_URL=https://accesodigital.iados.mx

      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools

      - name: Crear credenciales de servicio
        run: |
          printf '%s' "${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}" > /tmp/firebase-sa.json

      - name: Distribuir via Firebase App Distribution
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-sa.json
        run: |
          firebase appdistribution:distribute \
            build/app/outputs/flutter-apk/app-release.apk \
            --app "${{ secrets.FIREBASE_APP_ID }}" \
            --release-notes "${{ github.event.inputs.release_notes }}" \
            --groups "${{ github.event.inputs.groups }}"

      - name: Subir APK como artifact de respaldo
        uses: actions/upload-artifact@v4
        with:
          name: AccesoDigital-Firebase-${{ steps.version.outputs.version }}
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
