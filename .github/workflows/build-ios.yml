name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Instalar dependencias
        run: flutter pub upgrade

      - name: Actualizar repo de CocoaPods
        run: |
          cd ios
          pod repo update

      - name: Build iOS (sin firma)
        run: |
          flutter build ios --release --no-codesign \
            --dart-define=API_URL=https://accesodigitalapi.iados.mx/api \
            --dart-define=PORTAL_URL=https://accesodigital.iados.mx
        env:
          CODE_SIGN_IDENTITY: ""
          CODE_SIGNING_REQUIRED: "NO"
          CODE_SIGNING_ALLOWED: "NO"

      - name: Empacar como .ipa
        run: |
          cd build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r ../../../acceso-digital.ipa Payload/

      - name: Subir IPA como artifact
        uses: actions/upload-artifact@v4
        with:
          name: acceso-digital-ios
          path: mobile/acceso-digital.ipa
          retention-days: 7
